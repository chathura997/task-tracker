spring:
  application:
    name: backend

  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME:tasktracker}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS}

logging:
  level:
    org.springframework.security: DEBUG
    com.task_tracker.backend: DEBUG

allowed:
  origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

